# ==========================================
# ORQUESTRADOR DE INFRAESTRUTURA - FASE 3
# ==========================================

services:
  # ----------------------------------------
  # CAMADA DE DADOS: PostgreSQL
  # ----------------------------------------
  db:
    image: postgres:15-alpine
    container_name: medsched-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: America/Sao_Paulo
    ports:
      - "45432:5432"
    volumes:
      - medsched_db_data:/var/lib/postgresql/data
    networks:
      - medsched_net

  # ----------------------------------------
  # CAMADA LÓGICA: API Python (FastAPI)
  # ----------------------------------------
  api:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: medsched-api
    restart: unless-stopped
    # Mapeamento: Porta 40000 no seu servidor -> Porta 8000 no container
    ports:
      - "40000:8000"
    # Sincroniza o seu código local com o container (não precisa reiniciar pra ver mudanças)
    volumes:
      - ./backend:/app
    # Injeta as variáveis de ambiente e garante que a API só suba DEPOIS do banco
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - medsched_net

# ----------------------------------------
# VOLUMES PERSISTENTES
# ----------------------------------------
volumes:
  medsched_db_data:
    name: medsched_db_data

# ----------------------------------------
# REDES VIRTUAIS ISOLADAS
# ----------------------------------------
networks:
  medsched_net:
    name: medsched_net
    driver: bridge



# ==========================================
# ORQUESTRADOR DE INFRAESTRUTURA - FASE 3
# ==========================================

services:
  # ----------------------------------------
  # CAMADA DE DADOS: PostgreSQL
  # ----------------------------------------
  db:
    image: postgres:15-alpine
    container_name: medsched-db
    restart: unless-stopped
    # Injeta as variáveis de segurança do nosso arquivo .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: America/Sao_Paulo
    # Mapeamento de Portas (Host : Container) conforme nossa topologia
    ports:
      - "45432:5432"
    # Persistência de Dados (evita que os dados sumam se o container reiniciar)
    volumes:
      - medsched_db_data:/var/lib/postgresql/data
    # Isola o banco em uma rede privada do Docker
    networks:
      - medsched_net

# ----------------------------------------
# VOLUMES PERSISTENTES
# ----------------------------------------
volumes:
  medsched_db_data:
    name: medsched_db_data

# ----------------------------------------
# REDES VIRTUAIS ISOLADAS
# ----------------------------------------
networks:
  medsched_net:
    name: medsched_net
    driver: bridge

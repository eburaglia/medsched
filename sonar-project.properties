sonar.projectKey=meu-projeto-fullstack
sonar.projectName=Meu Projeto Python + React
sonar.sourceEncoding=UTF-8

# Python
sonar.python.version=3.11
sonar.python.coverage.reportPaths=coverage.xml

# JavaScript/React
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.exclusions=**/node_modules/**,**/build/**

# Geral
sonar.exclusions=**/venv/**,**/__pycache__/**,**/node_modules/**,**/.git/**
sonar.tests=.
sonar.test.inclusions=**/*test.py,**/*test.js,**/*test.jsx,**/tests/**
